  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a32e983f-f908-4d71-81fb-6d903a79418a\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  \n  <style>\n    body { margin:0; }\n    doc-page:not(:defined){ visibility:hidden; }\n    h1,h2,h3,p,li,td,th { font-family:Verdana,Geneva,Tahoma,Arial,sans-serif; }\n    a { color:#AC0234; }\n    a:hover { color:#8a0228; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"doc-page\" from=\"61163f31-a594-4f76-bac8-d845b4dfeac1#/doc-page.js\" size=\"a4\" margin=\"0.85in\" hint-size=\"100%,100%\">\n\n  <div style=\"border-bottom:3px solid #AC0234; padding-bottom:18px; margin-bottom:26px;\">\n    <img src=\"21aff672-0064-45f8-b16f-9c2f57d94a01\" alt=\"NVHP — Voor een hypotheek die klopt\" style=\"width:250px; height:auto; display:block;\">\n    <p style=\"margin:18px 0 0;\"><a href=\"index.html\" style=\"font-size:12px; font-weight:700; color:#163A75; text-decoration:none;\">← Terug naar de tool<\u002Fa><\u002Fp>\n    <p style=\"margin:14px 0 0; font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#AC0234;\">Handleiding<\u002Fp>\n    <h1 style=\"margin:6px 0 0; font-size:30px; line-height:1.2; font-weight:700; color:#163A75;\">Uitnodiging Generator<\u002Fh1>\n    <p style=\"margin:10px 0 0; font-size:13.5px; line-height:1.6; color:#5a6172;\">Zelf professionele masterclass- en trainingsuitnodigingen opmaken in de NVHP-huisstijl en versturen aan klanten — zonder opmaakkennis.<\u002Fp>\n  <\u002Fdiv>\n\n  <h2 style=\"font-size:17px; color:#163A75; margin:0 0 8px;\">1. Wat doet de tool?<\u002Fh2>\n  <p style=\"font-size:13px; line-height:1.7; color:#2f3542; margin:0 0 10px; text-wrap:pretty;\">De generator bestaat uit twee helften. Links vul je een formulier in; rechts zie je de uitnodiging <strong>live<\u002Fstrong> meebewegen. De opmaak, het logo en de tagline “Voor een hypotheek die klopt” staan vast — jij verandert alleen de teksten. Als de mail er goed uitziet, exporteer je hem met één van de twee knoppen bovenaan.<\u002Fp>\n  <p style=\"font-size:13px; line-height:1.7; color:#2f3542; margin:0 0 18px; text-wrap:pretty;\">De uitnodiging volgt het vaste NVHP-sjabloon met vier onderdelen: opening &amp; inhoud, “de details die het verschil maken”, praktische informatie, en de ervaring van een collega.<\u002Fp>\n\n  <h2 style=\"font-size:17px; color:#163A75; margin:0 0 8px;\">2. De velden invullen<\u002Fh2>\n  <sc-raw-table cellspacing=\"0\" cellpadding=\"0\" style=\"width:100%; border-collapse:collapse; margin:0 0 18px;\">\n    <sc-raw-thead><sc-raw-tr>\n      <sc-raw-th style=\"text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:#7a8194; border-bottom:2px solid #e0ddd5; padding:0 10px 7px 0; width:150px;\">Onderdeel<\u002Fsc-raw-th>\n      <sc-raw-th style=\"text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:#7a8194; border-bottom:2px solid #e0ddd5; padding:0 0 7px;\">Wat vul je in<\u002Fsc-raw-th>\n    <\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n    <sc-raw-tbody>\n      <sc-raw-tr><sc-raw-td style=\"vertical-align:top; font-size:12.5px; font-weight:700; color:#163A75; border-bottom:1px solid #eeece6; padding:10px 10px 10px 0;\">1 · Opening &amp; inhoud<\u002Fsc-raw-td><sc-raw-td style=\"vertical-align:top; font-size:12.5px; line-height:1.6; color:#2f3542; border-bottom:1px solid #eeece6; padding:10px 0;\">Label, titel, datumregel, aanhef en introtekst. De <strong>onderwerpen<\u002Fstrong> typ je met één onderwerp per regel — elke regel wordt automatisch een opsommingsbolletje.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n      <sc-raw-tr><sc-raw-td style=\"vertical-align:top; font-size:12.5px; font-weight:700; color:#163A75; border-bottom:1px solid #eeece6; padding:10px 10px 10px 0;\">Docent<\u002Fsc-raw-td><sc-raw-td style=\"vertical-align:top; font-size:12.5px; line-height:1.6; color:#2f3542; border-bottom:1px solid #eeece6; padding:10px 0;\">Naam, functie en organisatie. Optioneel een <strong>foto-URL<\u002Fstrong> (zie punt 4).<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n      <sc-raw-tr><sc-raw-td style=\"vertical-align:top; font-size:12.5px; font-weight:700; color:#163A75; border-bottom:1px solid #eeece6; padding:10px 10px 10px 0;\">2 · Details<\u002Fsc-raw-td><sc-raw-td style=\"vertical-align:top; font-size:12.5px; line-height:1.6; color:#2f3542; border-bottom:1px solid #eeece6; padding:10px 0;\">Twee of drie prikkelende inzichten, één per regel. Deze komen in het rode kader in cursief.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n      <sc-raw-tr><sc-raw-td style=\"vertical-align:top; font-size:12.5px; font-weight:700; color:#163A75; border-bottom:1px solid #eeece6; padding:10px 10px 10px 0;\">3 · Praktische info<\u002Fsc-raw-td><sc-raw-td style=\"vertical-align:top; font-size:12.5px; line-height:1.6; color:#2f3542; border-bottom:1px solid #eeece6; padding:10px 0;\">Datum, aanvang, einde, locatie en kosten. Plus de tekst én de <strong>link<\u002Fstrong> van de aanmeldknop.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n      <sc-raw-tr><sc-raw-td style=\"vertical-align:top; font-size:12.5px; font-weight:700; color:#163A75; border-bottom:1px solid #eeece6; padding:10px 10px 10px 0;\">4 · Ervaring collega<\u002Fsc-raw-td><sc-raw-td style=\"vertical-align:top; font-size:12.5px; line-height:1.6; color:#2f3542; border-bottom:1px solid #eeece6; padding:10px 0;\">Een citaat met naam en kantoor. Vraag de collega vooraf om toestemming.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n      <sc-raw-tr><sc-raw-td style=\"vertical-align:top; font-size:12.5px; font-weight:700; color:#163A75; padding:10px 10px 10px 0;\">Afsluiting<\u002Fsc-raw-td><sc-raw-td style=\"vertical-align:top; font-size:12.5px; line-height:1.6; color:#2f3542; padding:10px 0;\">De slotzin onderaan de mail.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n    <\u002Fsc-raw-tbody>\n  <\u002Fsc-raw-table>\n\n  <h2 style=\"font-size:17px; color:#163A75; margin:0 0 8px;\">3. Exporteren — twee manieren<\u002Fh2>\n  <div style=\"break-inside:avoid; background:#fbf3f4; border-left:4px solid #AC0234; padding:16px 20px; margin:0 0 12px; border-radius:0 6px 6px 0;\">\n    <p style=\"margin:0 0 5px; font-size:14px; font-weight:700; color:#AC0234;\">A · Nieuwsbrief-HTML downloaden<\u002Fp>\n    <p style=\"margin:0; font-size:12.5px; line-height:1.6; color:#2f3542; text-wrap:pretty;\">Levert een kant-en-klaar <strong>.html-bestand<\u002Fstrong>. Upload of plak dit in een nieuwsbriefdienst zoals Mailchimp, Laposta of Spotler. Aanrader bij grote lijsten: die diensten regelen de verzending, de verplichte afmeldlink en de AVG-naleving. Zo verstuur je in één keer aan al je klanten.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"break-inside:avoid; background:#f0f3f8; border-left:4px solid #163A75; padding:16px 20px; margin:0 0 16px; border-radius:0 6px 6px 0;\">\n    <p style=\"margin:0 0 5px; font-size:14px; font-weight:700; color:#163A75;\">B · Kopiëren voor Outlook<\u002Fp>\n    <p style=\"margin:0; font-size:12.5px; line-height:1.6; color:#2f3542; text-wrap:pretty;\">Kopieert de opmaak naar je klembord. Open een nieuwe mail in Outlook, klik in het tekstvak en plak met <strong>Ctrl+V<\u002Fstrong>. Zet je ontvangers in het <strong>BCC<\u002Fstrong>-veld (niet CC), zodat e-mailadressen onderling onzichtbaar blijven. Lukt kopiëren niet in je browser, dan downloadt de knop automatisch het bestand — open dat, selecteer alles (Ctrl+A), kopieer (Ctrl+C) en plak in Outlook.<\u002Fp>\n  <\u002Fdiv>\n  <p style=\"font-size:12.5px; line-height:1.7; color:#2f3542; margin:0 0 18px; text-wrap:pretty;\">Beide exports gebruiken <strong>e-mailveilige tabelopmaak<\u002Fstrong> met het logo als ingebedde afbeelding, zodat de mail in elk mailprogramma netjes wordt weergegeven. <strong>Test altijd eerst<\u002Fstrong> door de uitnodiging naar jezelf te sturen voordat je hem naar klanten verstuurt.<\u002Fp>\n\n  <h2 style=\"font-size:17px; color:#163A75; margin:0 0 8px;\">4. Een docentfoto toevoegen<\u002Fh2>\n  <p style=\"font-size:13px; line-height:1.7; color:#2f3542; margin:0 0 10px; text-wrap:pretty;\">In de preview kun je een foto in het fotovak <strong>slepen<\u002Fstrong> — handig om te zien hoe het oogt. Zo'n gesleepte foto komt echter <strong>niet<\u002Fstrong> mee in de export. Voor een foto in de verstuurde mail vul je het veld <strong>Foto-URL<\u002Fstrong> in met een openbaar bereikbaar internetadres van de foto (bijvoorbeeld een afbeelding op de NVHP-website, eindigend op .jpg of .png). Die foto verschijnt dan zowel in de preview als in beide exports.<\u002Fp>\n  <p style=\"font-size:13px; line-height:1.7; color:#2f3542; margin:0 0 18px; text-wrap:pretty;\">Geen URL bij de hand? Vraag de webbeheerder de foto op de NVHP-site te plaatsen, of voeg de foto handmatig toe in je nieuwsbriefdienst nadat je de HTML hebt geïmporteerd.<\u002Fp>\n\n  <h2 style=\"font-size:17px; color:#163A75; margin:0 0 8px;\">5. Waar plaats je de tool?<\u002Fh2>\n  <p style=\"font-size:13px; line-height:1.7; color:#2f3542; margin:0 0 12px; text-wrap:pretty;\">De generator is een webpagina. Om hem herbruikbaar te maken voor het secretariaat kies je één van deze plekken:<\u002Fp>\n  <sc-raw-table cellspacing=\"0\" cellpadding=\"0\" style=\"width:100%; border-collapse:collapse; margin:0 0 16px;\">\n    <sc-raw-thead><sc-raw-tr>\n      <sc-raw-th style=\"text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:#7a8194; border-bottom:2px solid #e0ddd5; padding:0 10px 7px 0; width:150px;\">Plek<\u002Fsc-raw-th>\n      <sc-raw-th style=\"text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:#7a8194; border-bottom:2px solid #e0ddd5; padding:0 0 7px;\">Voor wie / hoe<\u002Fsc-raw-th>\n    <\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n    <sc-raw-tbody>\n      <sc-raw-tr><sc-raw-td style=\"vertical-align:top; font-size:12.5px; font-weight:700; color:#163A75; border-bottom:1px solid #eeece6; padding:10px 10px 10px 0;\">Gedeelde schijf / SharePoint<\u002Fsc-raw-td><sc-raw-td style=\"vertical-align:top; font-size:12.5px; line-height:1.6; color:#2f3542; border-bottom:1px solid #eeece6; padding:10px 0;\">Eenvoudigst intern. Zet het losse HTML-bestand (zie hieronder) op de gedeelde map; collega's openen het door te dubbelklikken in hun browser.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n      <sc-raw-tr><sc-raw-td style=\"vertical-align:top; font-size:12.5px; font-weight:700; color:#163A75; border-bottom:1px solid #eeece6; padding:10px 10px 10px 0;\">Intranet / NVHP-website<\u002Fsc-raw-td><sc-raw-td style=\"vertical-align:top; font-size:12.5px; line-height:1.6; color:#2f3542; border-bottom:1px solid #eeece6; padding:10px 0;\">Laat de webbeheerder het bestand op een interne pagina plaatsen (bijv. <em>nvhp.nl/intern/uitnodiging<\u002Fem>), zodat iedereen er via een link bij kan.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n      <sc-raw-tr><sc-raw-td style=\"vertical-align:top; font-size:12.5px; font-weight:700; color:#163A75; padding:10px 10px 10px 0;\">Gratis webhosting<\u002Fsc-raw-td><sc-raw-td style=\"vertical-align:top; font-size:12.5px; line-height:1.6; color:#2f3542; padding:10px 0;\">Diensten als Netlify Drop of GitHub Pages hosten het bestand gratis achter een vaste link — sleep het bestand erin, klaar.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n    <\u002Fsc-raw-tbody>\n  <\u002Fsc-raw-table>\n  <div style=\"break-inside:avoid; background:#f1f2f4; padding:16px 20px; border-radius:6px; margin:0 0 8px;\">\n    <p style=\"margin:0 0 5px; font-size:13px; font-weight:700; color:#163A75;\">Belangrijk: vraag om het losse bestand<\u002Fp>\n    <p style=\"margin:0; font-size:12.5px; line-height:1.6; color:#2f3542; text-wrap:pretty;\">Om de tool elders te draaien heb je één zelfstandig HTML-bestand nodig dat alles (logo, opmaak, code) in zich heeft. Vraag daarom om de generator als <strong>“standalone HTML”<\u002Fstrong> geleverd te krijgen; dat bestand werkt overal, ook offline, zonder losse hulpbestanden.<\u002Fp>\n  <\u002Fdiv>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
