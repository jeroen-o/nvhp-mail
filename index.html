  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

    <\u002Fdiv>\n\n      <div style=\"padding:22px 40px 8px; font-size:14.5px; line-height:1.6; color:#2f3542;\">\n        <ul style=\"margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:12px;\">\n          <sc-for list=\"{{ bulletList }}\" as=\"b\" hint-placeholder-count=\"5\">\n            <li style=\"display:flex; gap:12px;\"><span style=\"flex:none; width:7px; height:7px; margin-top:8px; border-radius:50%; background:#AC0234;\"><\u002Fspan><span>{{ b }}<\u002Fspan><\u002Fli>\n          <\u002Fsc-for>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div style=\"margin:28px 40px 4px; background:#fbf3f4; border-left:4px solid #AC0234; border-radius:0 8px 8px 0; padding:22px 24px;\">\n        <h2 style=\"margin:0 0 14px; font-size:16px; font-weight:700; color:#AC0234;\">{{ f.detailsHeading }}<\u002Fh2>\n        <div style=\"display:flex; flex-direction:column; gap:12px; font-size:14px; line-height:1.6; font-style:italic; color:#4a3238;\">\n          <sc-for list=\"{{ detailList }}\" as=\"d\" hint-placeholder-count=\"3\">\n            <p style=\"margin:0;\">{{ d }}<\u002Fp>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin:28px 40px 4px; background:#f1f2f4; border-radius:8px; padding:22px 24px;\">\n        <h2 style=\"margin:0 0 16px; font-size:16px; font-weight:700; color:#163A75;\">Praktische informatie<\u002Fh2>\n        <div style=\"display:grid; grid-template-columns:120px 1fr; row-gap:11px; column-gap:16px; font-size:14px; line-height:1.5; color:#2f3542;\">\n          <div style=\"font-weight:700; color:#163A75;\">Datum<\u002Fdiv><div>{{ f.piDatum }}<\u002Fdiv>\n          <div style=\"font-weight:700; color:#163A75;\">Aanvang<\u002Fdiv><div>{{ f.piAanvang }}<\u002Fdiv>\n          <div style=\"font-weight:700; color:#163A75;\">Einde<\u002Fdiv><div>{{ f.piEinde }}<\u002Fdiv>\n          <div style=\"font-weight:700; color:#163A75;\">Locatie<\u002Fdiv><div>{{ f.piLocatie }}<\u002Fdiv>\n          <div style=\"font-weight:700; color:#163A75;\">Kosten<\u002Fdiv><div>{{ f.piKosten }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px;\">\n          <a href=\"{{ f.ctaHref }}\" style=\"display:inline-block; background:#AC0234; color:#ffffff; text-decoration:none; font-size:14px; font-weight:700; padding:13px 30px; border-radius:6px;\">{{ f.ctaLabel }}<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin:28px 40px 8px; background:#f0f3f8; border-left:4px solid #163A75; border-radius:0 8px 8px 0; padding:22px 24px;\">\n        <h2 style=\"margin:0 0 12px; font-size:16px; font-weight:700; color:#163A75;\">{{ f.quoteHeading }}<\u002Fh2>\n        <p style=\"margin:0; font-size:14.5px; line-height:1.7; font-style:italic; color:#2f3542;\">{{ quoteQuoted }}<\u002Fp>\n        <p style=\"margin:12px 0 0; font-size:13px; font-weight:700; color:#163A75;\">{{ quoteDash }}<\u002Fp>\n        <p style=\"margin:1px 0 0; font-size:12.5px; color:#5a6172;\">{{ f.quoteOrg }}<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"padding:8px 40px 36px; font-size:14.5px; line-height:1.7; color:#2f3542;\">\n        <p style=\"margin:0;\">{{ f.closing }}<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#163A75; padding:24px 40px; color:#c7d1e4; font-size:12px; line-height:1.6;\">\n        <p style=\"margin:0; font-weight:700; color:#ffffff;\">Nederlandse Vereniging van Hypothecair Planners<\u002Fp>\n        <p style=\"margin:4px 0 0;\">Secretariaat NVHP · Hoevelaken · Voor een hypotheek die klopt<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    outlookLabel: \"B · Kopiëren voor Outlook\",\n    uploadLabel: \"Laden (JSON)\",\n    recipientsLabel: \"CSV met ontvangers uploaden\",\n    recipients: [],\n    recipientStatus: {},\n    f: {\n      kicker: \"Masterclass · Uitnodiging\",\n      title: \"Koop en verkoop van assurantieportefeuilles\",\n      dateline: \"Donderdag 13 augustus 2026 · 16.00–20.00 uur · Hoevelaken\",\n      greeting: \"Beste [naam],\",\n      intro: \"Op donderdag 13 augustus organiseren wij tussen 16.00 en 20.00 uur in Hoevelaken de masterclass Koop en verkoop assurantieportefeuilles. Tijdens deze middag behandelt topdocent Willem Haasnoot, hoogleraar waardering aan de UvA, onder meer de volgende onderwerpen.\",\n      bullets: \"de actuele eisen op grond van de Wft bij koop of verkoop van een assurantieportefeuille;\\nde actuele prijsvorming als gevolg van vraag en aanbod;\\nhet verschil in waardering tussen aandelen en portefeuille;\\naansprakelijkheid voor beroepsfouten die door de verkopende partij zijn begaan;\\nde waardering van de componenten hypotheken, schadeprovisie en abonnementen.\",\n      trainerName: \"Willem Haasnoot\",\n      trainerRole: \"Hoogleraar waardering\",\n      trainerOrg: \"Universiteit van Amsterdam\",\n      trainerPhoto: \"\",\n      detailsHeading: \"De details die het verschil maken\",\n      details: \"Bij een collectieve vergunning kan sprake zijn van samenloop van privaatrechtelijke en publiekrechtelijke aansprakelijkheid bij de collectieve vergunninghouder.\\nDe vraag of de koper op zijn investering kan afschrijven vormt een wezenlijk onderdeel van de waardering.\\nKent een onderneming een dagelijks beleidsbepaler, dan moet worden nagedacht over de consequenties voor de vergunning in het scenario van langdurige uitval.\",\n      piDatum: \"Donderdag 13 augustus 2026\",\n      piAanvang: \"16.00 uur\",\n      piEinde: \"20.00 uur (inclusief lichte maaltijd)\",\n      piLocatie: \"Secretariaat NVHP, Hoevelaken\",\n      piKosten: \"€ 232,50 per deelnemer (excl. btw)\",\n      ctaLabel: \"Meld u hier aan\",\n      ctaHref: \"#\",\n      quoteHeading: \"Zo ervoer een collega deze masterclass\",\n      quote: \"Je denkt als ondernemer al snel dat je alle zaken goed op orde hebt. De docent is top, maar ook de vragen en ervaringen die collega's tijdens deze masterclass deelden waren voor mij enorm waardevol.\",\n      quoteName: \"José de Boer\",\n      quoteOrg: \"Erkend Hypothecair Planner, kantoor De Horizon te Gemert\",\n      closing: \"We ontmoeten je graag op 13 augustus in Hoevelaken.\"\n    }\n  };\n\n  fileRef = React.createRef();\n  recipientsRef = React.createRef();\n\n  triggerRecipients = () => {\n    if (this.recipientsRef.current) this.recipientsRef.current.click();\n  };\n\n  loadRecipients = (e) => {\n    const file = e.target.files && e.target.files[0];\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = () => {\n      const text = String(reader.result || \"\").replace(/\\r/g, \"\");\n      const rows = text.split(\"\\n\").map(l => l.trim()).filter(Boolean);\n      const emailRe = /[^\\s,;]+@[^\\s,;]+\\.[^\\s,;]+/;\n      const out = [];\n      rows.forEach(line => {\n        const lower = line.toLowerCase();\n        if (/^(naam|name)[;,\\t]/.test(lower) && lower.indexOf(\"@\") === -1) return; // skip header\n        const parts = line.split(/[;,\\t]/).map(p => p.trim()).filter(Boolean);\n        let email = \"\", name = \"\";\n        parts.forEach(p => { if (!email && emailRe.test(p)) email = p; });\n        name = parts.filter(p => p !== email).join(\" \").trim();\n        if (!email) { const m = line.match(emailRe); if (m) email = m[0]; }\n        if (!name && email) name = email.split(\"@\")[0];\n        if (email) out.push({ name: name || email, email });\n      });\n      if (out.length) {\n        this.setState({ recipients: out, recipientStatus: {}, recipientsLabel: out.length + \" ontvangers geladen ✓\" });\n      } else {\n        this.setState({ recipientsLabel: \"Geen ontvangers gevonden\" });\n      }\n      setTimeout(() => this.setState({ recipientsLabel: \"CSV met ontvangers uploaden\" }), 2600);\n    };\n    reader.readAsText(file);\n    e.target.value = \"\";\n  };\n\n  clearRecipients = () => this.setState({ recipients: [], recipientStatus: {} });\n\n  emailFor(name) {\n    const html = this.buildEmailHtml();\n    return html.split(\"[naam]\").join(this.esc(name));\n  }\n\n  prepareRecipient = (i) => async () => {\n    const r = this.state.recipients[i];\n    if (!r) return;\n    const html = this.emailFor(r.name);\n    let copied = false;\n    try {\n      if (window.ClipboardItem && navigator.clipboard && navigator.clipboard.write) {\n        await navigator.clipboard.write([new ClipboardItem({\n          \"text/html\": new Blob([html], { type: \"text/html\" }),\n          \"text/plain\": new Blob([this.state.f.title], { type: \"text/plain\" })\n        })]);\n        copied = true;\n      }\n    } catch (err) { copied = false; }\n    const mail = \"mailto:\" + r.email + \"?subject=\" + encodeURIComponent(this.state.f.title || \"\");\n    const a = document.createElement(\"a\");\n    a.href = mail;\n    document.body.appendChild(a);\n    a.click();\n    a.remove();\n    this.setState(s => ({ recipientStatus: { ...s.recipientStatus, [i]: copied ? \"Plak (Ctrl+V)\" : \"Outlook geopend\" } }));\n    setTimeout(() => this.setState(s => {\n      const st = { ...s.recipientStatus }; delete st[i]; return { recipientStatus: st };\n    }), 4000);\n  };\n\n  downloadWordMerge = () => {\n    const field = '<span style=\\'mso-field-code:\" MERGEFIELD Naam \"\\'>«Naam»<\u002Fspan>';\n    const html = this.buildEmailHtml().split(\"[naam]\").join(field);\n    const doc = '<html xmlns:o=\"urn:schemas-microsoft-com:office:office\" '\n      + 'xmlns:w=\"urn:schemas-microsoft-com:office:word\" xmlns=\"http://www.w3.org/TR/REC-html40\">'\n      + '<head><meta charset=\"utf-8\"><title>' + this.esc(this.state.f.title) + '<\u002Ftitle>'\n      + '<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print<\u002Fw:View>'\n      + '<w:Zoom>100<\u002Fw:Zoom><\u002Fw:WordDocument><\u002Fxml><![endif]-->'\n      + '<style>@page{size:A4;margin:1.5cm;} body{margin:0;}<\u002Fstyle><\u002Fhead>'\n      + '<body>' + html + '<\u002Fbody><\u002Fhtml>';\n    this.saveBlob('\\ufeff' + doc, \"application/msword\", this.slug() + \"-samenvoegen.doc\");\n  };\n\n\n  slug() {\n    const f = this.state.f;\n    const base = ((f.title || \"uitnodiging\") + \" \" + (f.piDatum || \"\"))\n      .toLowerCase()\n      .replace(/[àáâä]/g, \"a\").replace(/[éèêë]/g, \"e\").replace(/[íìîï]/g, \"i\")\n      .replace(/[óòôö]/g, \"o\").replace(/[úùûü]/g, \"u\")\n      .replace(/[^a-z0-9]+/g, \"-\").replace(/^-+|-+$/g, \"\");\n    return base || \"uitnodiging\";\n  }\n\n  saveBlob(data, mime, filename) {\n    const blob = new Blob([data], { type: mime });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    a.href = url;\n    a.download = filename;\n    document.body.appendChild(a);\n    a.click();\n    a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n  }\n\n  downloadJson = () => {\n    const payload = { _type: \"nvhp-uitnodiging\", _version: 1, fields: this.state.f };\n    this.saveBlob(JSON.stringify(payload, null, 2), \"application/json\", this.slug() + \".json\");\n  };\n\n  triggerUpload = () => {\n    if (this.fileRef.current) this.fileRef.current.click();\n  };\n\n  loadJson = (e) => {\n    const file = e.target.files && e.target.files[0];\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = () => {\n      try {\n        const data = JSON.parse(reader.result);\n        const incoming = data && data.fields ? data.fields : data;\n        if (!incoming || typeof incoming !== \"object\") throw new Error(\"bad\");\n        const merged = { ...this.state.f };\n        Object.keys(this.state.f).forEach(k => {\n          if (incoming[k] != null) merged[k] = String(incoming[k]);\n        });\n        this.setState({ f: merged, uploadLabel: \"Geladen ✓\" });\n      } catch (err) {\n        this.setState({ uploadLabel: \"Ongeldig bestand\" });\n      }\n      setTimeout(() => this.setState({ uploadLabel: \"Laden (JSON)\" }), 2000);\n    };\n    reader.readAsText(file);\n    e.target.value = \"\";\n  };\n\n  downloadWord = () => {\n    const html = this.buildEmailHtml();\n    const doc = '<html xmlns:o=\"urn:schemas-microsoft-com:office:office\" '\n      + 'xmlns:w=\"urn:schemas-microsoft-com:office:word\" xmlns=\"http://www.w3.org/TR/REC-html40\">'\n      + '<head><meta charset=\"utf-8\"><title>' + this.esc(this.state.f.title) + '<\u002Ftitle>'\n      + '<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print<\u002Fw:View>'\n      + '<w:Zoom>100<\u002Fw:Zoom><\u002Fw:WordDocument><\u002Fxml><![endif]-->'\n      + '<style>@page{size:A4;margin:1.5cm;} body{margin:0;}<\u002Fstyle><\u002Fhead>'\n      + '<body>' + html + '<\u002Fbody><\u002Fhtml>';\n    this.saveBlob('\\ufeff' + doc, \"application/msword\", this.slug() + \".doc\");\n  };\n\n  reset = () => {\n    if (!window.confirm(\"Alle velden leegmaken en opnieuw beginnen?\")) return;\n    const empty = {};\n    Object.keys(this.state.f).forEach(k => { empty[k] = \"\"; });\n    empty.ctaHref = \"#\";\n    this.setState({ f: empty });\n  };\n\n  setField = (key) => (e) => {\n    const v = e.target.value;\n    this.setState(s => ({ f: { ...s.f, [key]: v } }));\n  };\n\n  esc(s) {\n    return String(s == null ? \"\" : s)\n      .replace(/&/g, \"&amp;\").replace(/<\u002Fg, \"&lt;\").replace(/>/g, \"&gt;\")\n      .replace(/\"/g, \"&quot;\");\n  }\n\n  // Email-client-safe, table-based, inline-styled HTML (works in Outlook + newsletter tools)\n  buildEmailHtml() {\n    const f = this.state.f;\n    const e = (s) => this.esc(s);\n    const NAVY = \"#163A75\", RED = \"#AC0234\", INK = \"#2f3542\", SUB = \"#5a6172\";\n    const FF = \"font-family:Verdana,Geneva,Tahoma,Arial,sans-serif;\";\n    const logo = (typeof window !== \"undefined\" && window.NVHP_LOGO_EMAIL) || \"\";\n    const lines = (s) => (s || \"\").split(\"\\n\").map(x => x.trim()).filter(Boolean);\n\n    const photo = (f.trainerPhoto || \"\").trim();\n    const trainerCard = photo\n      ? '<table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" width=\"100%\" style=\"background:#f4f2ee;\"><tr>'\n        + '<td valign=\"top\" style=\"padding:16px 0 16px 20px;width:76px;\"><img src=\"' + e(photo) + '\" width=\"76\" height=\"92\" alt=\"' + e(f.trainerName) + '\" style=\"display:block;width:76px;height:92px;object-fit:cover;border:0;\"><\u002Ftd>'\n        + '<td valign=\"middle\" style=\"padding:16px 20px;\">'\n        + '<p style=\"margin:0;' + FF + 'font-size:16px;font-weight:bold;color:' + NAVY + ';\">' + e(f.trainerName) + '<\u002Fp>'\n        + '<p style=\"margin:3px 0 0;' + FF + 'font-size:13px;color:' + SUB + ';\">' + e(f.trainerRole) + '<\u002Fp>'\n        + '<p style=\"margin:1px 0 0;' + FF + 'font-size:13px;color:' + SUB + ';\">' + e(f.trainerOrg) + '<\u002Fp>'\n        + '<\u002Ftd><\u002Ftr><\u002Ftable>'\n      : '<table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" width=\"100%\" style=\"background:#f4f2ee;\"><tr><td style=\"padding:16px 20px;\">'\n        + '<p style=\"margin:0;' + FF + 'font-size:16px;font-weight:bold;color:' + NAVY + ';\">' + e(f.trainerName) + '<\u002Fp>'\n        + '<p style=\"margin:3px 0 0;' + FF + 'font-size:13px;color:' + SUB + ';\">' + e(f.trainerRole) + '<\u002Fp>'\n        + '<p style=\"margin:1px 0 0;' + FF + 'font-size:13px;color:' + SUB + ';\">' + e(f.trainerOrg) + '<\u002Fp>'\n        + '<\u002Ftd><\u002Ftr><\u002Ftable>';\n\n    const bullets = lines(f.bullets).map(b =>\n      '<tr><td valign=\"top\" style=\"width:16px;padding:0 0 12px 0;\">'\n      + '<div style=\"width:7px;height:7px;background:' + RED + ';border-radius:50%;margin-top:7px;\"><\u002Fdiv><\u002Ftd>'\n      + '<td style=\"padding:0 0 12px 8px;' + FF + 'font-size:14px;line-height:1.6;color:' + INK + ';\">' + e(b) + '<\u002Ftd><\u002Ftr>'\n    ).join(\"\");\n\n    const details = lines(f.details).map(d =>\n      '<p style=\"margin:0 0 12px;' + FF + 'font-size:14px;line-height:1.6;font-style:italic;color:#4a3238;\">' + e(d) + '<\u002Fp>'\n    ).join(\"\");\n\n    const infoRow = (k, v) =>\n      '<tr><td valign=\"top\" style=\"' + FF + 'font-size:14px;line-height:1.5;font-weight:bold;color:' + NAVY + ';padding:0 16px 11px 0;white-space:nowrap;\">' + e(k) + '<\u002Ftd>'\n      + '<td valign=\"top\" style=\"' + FF + 'font-size:14px;line-height:1.5;color:' + INK + ';padding:0 0 11px 0;\">' + e(v) + '<\u002Ftd><\u002Ftr>';\n\n    return ''\n+ '<table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" width=\"100%\" style=\"background:#e9e6e0;\">'\n+ '<tr><td align=\"center\" style=\"padding:40px 16px;\">'\n+ '<table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" width=\"640\" style=\"width:640px;max-width:640px;background:#ffffff;\">'\n\n+ '<tr><td style=\"padding:30px 40px 22px;border-bottom:3px solid ' + RED + ';\">'\n+ (logo ? '<img src=\"' + logo + '\" width=\"280\" alt=\"NVHP — Voor een hypotheek die klopt\" style=\"display:block;width:280px;height:auto;border:0;\">' : '') + '<\u002Ftd><\u002Ftr>'\n\n+ '<tr><td style=\"padding:34px 40px 0;\">'\n+ '<p style=\"margin:0 0 8px;' + FF + 'font-size:11px;font-weight:bold;letter-spacing:1.4px;text-transform:uppercase;color:' + RED + ';\">' + e(f.kicker) + '<\u002Fp>'\n+ '<h1 style=\"margin:0;' + FF + 'font-size:26px;line-height:1.25;font-weight:bold;color:' + NAVY + ';\">' + e(f.title) + '<\u002Fh1>'\n+ '<p style=\"margin:12px 0 0;' + FF + 'font-size:14px;color:' + SUB + ';\">' + e(f.dateline) + '<\u002Fp><\u002Ftd><\u002Ftr>'\n\n+ '<tr><td style=\"padding:26px 40px 0;' + FF + 'font-size:14.5px;line-height:1.7;color:' + INK + ';\">'\n+ '<p style=\"margin:0 0 16px;\">' + e(f.greeting) + '<\u002Fp>'\n+ '<p style=\"margin:0;\">' + e(f.intro) + '<\u002Fp><\u002Ftd><\u002Ftr>'\n\n+ '<tr><td style=\"padding:24px 40px 0;\">' + trainerCard + '<\u002Ftd><\u002Ftr>'\n\n+ '<tr><td style=\"padding:22px 40px 0;\">'\n+ '<table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" width=\"100%\">' + bullets + '<\u002Ftable><\u002Ftd><\u002Ftr>'\n\n+ '<tr><td style=\"padding:26px 40px 0;\">'\n+ '<table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" width=\"100%\" style=\"background:#fbf3f4;border-left:4px solid ' + RED + ';\">'\n+ '<tr><td style=\"padding:20px 24px;\">'\n+ '<h2 style=\"margin:0 0 14px;' + FF + 'font-size:16px;font-weight:bold;color:' + RED + ';\">' + e(f.detailsHeading) + '<\u002Fh2>'\n+ details + '<\u002Ftd><\u002Ftr><\u002Ftable><\u002Ftd><\u002Ftr>'\n\n+ '<tr><td style=\"padding:26px 40px 0;\">'\n+ '<table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" width=\"100%\" style=\"background:#f1f2f4;\">'\n+ '<tr><td style=\"padding:20px 24px;\">'\n+ '<h2 style=\"margin:0 0 16px;' + FF + 'font-size:16px;font-weight:bold;color:' + NAVY + ';\">Praktische informatie<\u002Fh2>'\n+ '<table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\">'\n+ infoRow(\"Datum\", f.piDatum) + infoRow(\"Aanvang\", f.piAanvang) + infoRow(\"Einde\", f.piEinde)\n+ infoRow(\"Locatie\", f.piLocatie) + infoRow(\"Kosten\", f.piKosten) + '<\u002Ftable>'\n+ '<table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"margin-top:18px;\"><tr>'\n+ '<td bgcolor=\"' + RED + '\" style=\"border-radius:6px;\">'\n+ '<a href=\"' + e(f.ctaHref) + '\" style=\"display:inline-block;' + FF + 'font-size:14px;font-weight:bold;color:#ffffff;text-decoration:none;padding:13px 30px;\">' + e(f.ctaLabel) + '<\u002Fa>'\n+ '<\u002Ftd><\u002Ftr><\u002Ftable><\u002Ftd><\u002Ftr><\u002Ftable><\u002Ftd><\u002Ftr>'\n\n+ '<tr><td style=\"padding:26px 40px 0;\">'\n+ '<table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" width=\"100%\" style=\"background:#f0f3f8;border-left:4px solid ' + NAVY + ';\">'\n+ '<tr><td style=\"padding:20px 24px;\">'\n+ '<h2 style=\"margin:0 0 12px;' + FF + 'font-size:16px;font-weight:bold;color:' +  && navigator.clipboard.write) {\n        await navigator.clipboard.write([new ClipboardItem({\n          \"text/html\": new Blob([html], { type: \"text/html\" }),\n          \"text/plain\": new Blob([this.state.f.title], { type: \"text/plain\" })\n        })]);\n        ok = true;\n      }\n    } catch (err) { ok = false; }\n    if (!ok) {\n      // fallback: download the file so the user can open + copy manually\n      this.downloadNewsletter();\n      this.setState({ outlookLabel: \"Gedownload (kopieer uit bestand)\" });\n      setTimeout(() => this.setState({ outlookLabel: \"B · Kopiëren voor Outlook\" }), 2600);\n      return;\n    }\n    this.setState({ outlookLabel: \"Gekopieerd ✓ — plak in Outlook\" });\n    setTimeout(() => this.setState({ outlookLabel: \"B · Kopiëren voor Outlook\" }), 2400);\n  };\n\n  renderVals() {\n    const f = this.state.f;\n    const set = {};\n    Object.keys(f).forEach(k => { set[k] = this.setField(k); });\n    const lines = (s) => (s || \"\").split(\"\\n\").map(x => x.trim()).filter(Boolean);\n    return {\n      f,\n      set,\n      bulletList: lines(f.bullets),\n      detailList: lines(f.details),\n      hasPhoto: !!(f.trainerPhoto || \"\").trim(),\n      noPhoto: !(f.trainerPhoto || \"\").trim(),\n      photoImg: (f.trainerPhoto || \"\").trim()\n        ? React.createElement(\"img\", { src: f.trainerPhoto.trim(), alt: \"Foto docent\", style: { width: \"100%\", height: \"100%\", objectFit: \"cover\", display: \"block\" } })\n        : null,\n      quoteQuoted: \"\\u201C\" + f.quote + \"\\u201D\",\n      quoteDash: \"— \" + f.quoteName,\n      reset: this.reset,\n      fileRef: this.fileRef,\n      downloadJson: this.downloadJson,\n      triggerUpload: this.triggerUpload,\n      loadJson: this.loadJson,\n      uploadLabel: this.state.uploadLabel,\n      downloadWord: this.downloadWord,\n      downloadWordMerge: this.downloadWordMerge,\n      recipientsRef: this.recipientsRef,\n      recipientsLabel: this.state.recipientsLabel,\n      triggerRecipients: this.triggerRecipients,\n      loadRecipients: this.loadRecipients,\n      clearRecipients: this.clearRecipients,\n      hasRecipients: this.state.recipients.length > 0,\n      recipientList: this.state.recipients.map((r, i) => ({\n        name: r.name,\n        email: r.email,\n        prepare: this.prepareRecipient(i),\n        label: this.state.recipientStatus[i] || \"Klaarzetten\"\n      })),\n      downloadNewsletter: this.downloadNewsletter,\n      copyOutlook: this.copyOutlook,\n      outlookLabel: this.state.outlookLabel\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
